<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP English / XP Voca - Cộng Đồng Học Từ Vựng Tiếng Anh Thông Minh</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="XP English (XP Voca) là nền tảng học từ vựng tiếng Anh cộng đồng thế hệ mới. Ứng dụng lặp lại ngắt quãng (Spaced Repetition) thông minh và luyện hội thoại với AI.">
  <meta name="keywords" content="XP English, XP Voca, học tiếng anh, từ vựng tiếng anh, ielts, toeic, spaced repetition, học từ vựng ai, cộng đồng học tiếng anh">
  <meta name="author" content="Vũ Văn Minh">
  
  <!-- Style Sheet -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦉</text></svg>">
</head>
<body class="no-navigation">

  <!-- Header Layout Layer -->
  <header id="app-header" class="hidden"></header>

  <!-- Navigation Sidebar Layer -->
  <aside id="app-sidebar" class="hidden"></aside>

  <!-- Main View Render Target -->
  <main id="app-content" class="main-content no-sidebars">
    <div id="app-view-container">
      <!-- Pages modules will dynamically inject here -->
      <div class="empty-state">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>
  </main>

  <!-- Right sidebar layout layer (Profile overview & achievements list) -->
  <aside id="app-right-sidebar" class="hidden"></aside>

  <!-- Global Toast Alerts container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- JavaScript Dependency Files -->
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
